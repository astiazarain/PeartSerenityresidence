# Single entry point for local development.
#
# Odoo modules expose static assets and routes under many different path
# prefixes we cannot fully enumerate (e.g. /partner_autocomplete/..., /iap/...,
# /web_editor/..., /shop/...), so the safe default is: everything goes to
# Odoo UNLESS it matches one of the website's own known routes/dev assets,
# which go to the Vite dev server on the host. Getting this backwards (website
# as the catch-all) causes Odoo's own JS/static assets to silently be served
# the website's index.html instead - a real bug hit in dev, not a caching
# issue.
#
# In production this same split is done at the domain/edge level instead
# (e.g. peartserenityresidence.com -> website, an admin subdomain -> Odoo),
# which avoids this whole class of path-collision bugs entirely.

server {
    listen 80;
    client_max_body_size 100m;

    # Odoo real-time notifications / live chat
    location /websocket {
        proxy_pass http://odoo:8072;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Vite dev server internals (HMR, module graph)
    location ~ ^/(@vite|@react-refresh|@id|@fs|src|node_modules) {
        proxy_pass http://host.docker.internal:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # The website's own routes + static files actually shipped in project/public
    location ~ ^/(services|about|facility|contact|quote|dashboard|auth|logo\.jpg|favicon\.svg)(/|$) {
        proxy_pass http://host.docker.internal:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = / {
        proxy_pass http://host.docker.internal:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Everything else: Odoo (backend UI, portal, module static assets, custom API)
    location / {
        proxy_pass http://odoo:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
