# Single entry point for local development.
#
#   /            -> the bolt.new website (Vite dev server on the host)
#   /odoo, /web, -> the Odoo 19 backend (CRM, sales, admin)
#   /website,
#   /api, /mail,
#   /report
#   /websocket   -> Odoo's live-update channel (chatter, notifications)
#
# In production this same split is done at the domain/edge level instead
# (e.g. peartserenityresidence.com -> website, an admin subdomain -> Odoo).

server {
    listen 80;
    client_max_body_size 100m;

    # Odoo backend, admin UI, portal, website builder assets, custom API
    location ~ ^/(web|odoo|website|api|mail|report)(/|$) {
        proxy_pass http://odoo:8069;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Odoo real-time notifications / live chat
    location /websocket {
        proxy_pass http://odoo:8072;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Everything else: the public website (Vite dev server on the host)
    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
