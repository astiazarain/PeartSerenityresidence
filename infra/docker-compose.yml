name: peartserenity

services:
  db:
    image: postgres:16
    container_name: peartserenity_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  odoo:
    image: odoo:19
    container_name: peartserenity
    depends_on:
      - db
    ports:
      - "8169:8069"
      - "8172:8072"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ../odoo/addons:/mnt/extra-addons
      - ../odoo/config:/etc/odoo
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: peartserenity_proxy
    depends_on:
      - odoo
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  odoo-db-data:
  odoo-web-data:
